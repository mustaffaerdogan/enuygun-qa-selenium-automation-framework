# ==========================================
# QA SELENIUM AUTOMATION FRAMEWORK CONFIG
# ==========================================

# Application URLs
base.url=https://www.enuygun.com
api.base.url=

# Browser Configuration
browser=chrome
# Options: chrome, firefox, edge
headless=false
browser.window.width=1920
browser.window.height=1080

# Timeout Configuration (in seconds)
implicit.wait=10
explicit.wait=20
page.load.timeout=30
script.timeout=30

# WebDriver Configuration
webdriver.auto.download=true
webdriver.cache=true

# Test Data Configuration
test.data.path=src/test/resources/testdata
faker.locale=en-US

# Screenshot Configuration
screenshot.path=target/screenshots
screenshot.on.failure=true
screenshot.on.success=false

# Reporting Configuration
allure.results.directory=target/allure-results
extent.report.path=target/extent-reports

# Logging Configuration
log.level=INFO
# Options: TRACE, DEBUG, INFO, WARN, ERROR, FATAL

# Retry Configuration
retry.failed.tests=false
retry.count=1

# Parallel Execution
parallel.execution=false
thread.count=3

# Environment
environment=test
# Options: dev, test, staging, production

# ==========================================
# FLIGHT SEARCH TEST DATA
# ==========================================

# Flight Origin and Destination
flight.origin=İstanbul
flight.destination=Ankara

# Flight Dates (format: dd.MM.yyyy)
# Örnek: 18.03.2026 veya dinamik +7 (bugünden 7 gün sonra)
flight.departure.date=28.05.2026
flight.return.date=23.05.2026

# ==========================================
# PRICE SORTING TEST DATA (Case 2)
# ==========================================

# Price Sorting - Flight Origin and Destination
price.sorting.origin=İstanbul
price.sorting.destination=Ankara

# Price Sorting - Flight Dates (format: dd.MM.yyyy)
price.sorting.departure.date=13.03.2026
price.sorting.return.date=15.03.2026

# ==========================================
# DATA EXTRACTION TEST DATA (Case 4)
# ==========================================

# Data Extraction - Flight Origin and Destination
data.extraction.origin=İstanbul
data.extraction.destination=Lefkoşa

# Data Extraction - Flight Dates (format: dd.MM.yyyy)
data.extraction.departure.date=15.03.2026
data.extraction.return.date=16.03.2026

