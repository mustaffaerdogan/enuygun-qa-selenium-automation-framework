# ==========================================
# QA SELENIUM AUTOMATION FRAMEWORK CONFIG
# ==========================================

# Application URLs
base.url=https://www.enuygun.com
api.base.url=

# Browser Configuration
browser=chrome
# Options: chrome, firefox, edge
headless=false
browser.window.width=1920
browser.window.height=1080

# Timeout Configuration (in seconds)
implicit.wait=10
explicit.wait=20
page.load.timeout=30
script.timeout=30

# WebDriver Configuration
webdriver.auto.download=true
webdriver.cache=true

# Test Data Configuration
test.data.path=src/test/resources/testdata
faker.locale=en-US

# Screenshot Configuration
screenshot.path=target/screenshots
screenshot.on.failure=true
screenshot.on.success=false

# Reporting Configuration
allure.results.directory=target/allure-results
extent.report.path=target/extent-reports

# Logging Configuration
log.level=INFO
# Options: TRACE, DEBUG, INFO, WARN, ERROR, FATAL

# Retry Configuration
retry.failed.tests=false
retry.count=1

# Parallel Execution
parallel.execution=false
thread.count=3

# Environment
environment=test
# Options: dev, test, staging, production

